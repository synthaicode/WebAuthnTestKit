schema: xrefkit.graph-rules/v1
repository: WebAuthnTestKit
profile_version: 1

# Requirement-independent traversal / pruning rules for TM candidate generation.
# Per-change TM, impacted-boundary list, per-PR traversal results, and seeds are
# NOT persisted here -- they are per-change artifacts.
traversal_policy:
  default_edges:
    - calls
    - type_reference
    - implements
    - inherits
  enabled_name_edges:
    - protocol_field
  weak_name_edges:
    - test_literal
    - environment_literal
  prune:
    - test_fixture_transit
    - generated_noise

name_stoplist_applied: true

edge_status:
  emitted: [calls, implements, inherits, contains, declares, uses-name]
  planned: [type_reference, reads, writes, uses-config, uses-db]

notes: |
  This repo is primarily type-coupled, so name edges are a minor axis
  (protocol field names only). The call + type graph carries most of the
  impact. Tests dominate fan-out and are pruned as transit.
