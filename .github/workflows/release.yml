name: Release

on:
  release:
    types: [published]   # create a GitHub Release with a tag like v0.1.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.1.0)'
        required: true

permissions:
  contents: write   # upload assets to the release
  packages: write   # push to GitHub Packages

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"   # strip leading v from the tag
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.ver.outputs.version }}

      - name: Unit tests
        run: dotnet test tests/WebAuthnTestKit.Tests/WebAuthnTestKit.Tests.csproj -c Release --no-build

      - name: Pack
        run: >
          dotnet pack src/WebAuthnTestKit/WebAuthnTestKit.csproj
          -c Release --no-build
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

      - name: Attach packages to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" artifacts/*.nupkg artifacts/*.snupkg --clobber
