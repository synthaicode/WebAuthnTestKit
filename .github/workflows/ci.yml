name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SourceLink wants full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Unit tests
        run: dotnet test tests/WebAuthnTestKit.Tests/WebAuthnTestKit.Tests.csproj -c Release --no-build

      - name: Pack (CI prerelease version)
        run: >
          dotnet pack src/WebAuthnTestKit/WebAuthnTestKit.csproj
          -c Release --no-build
          -p:Version=0.1.0-ci.${{ github.run_number }}
          -o artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
